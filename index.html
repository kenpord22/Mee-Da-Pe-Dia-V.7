<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, shrink-to-fit=no">
    <title>Mee-Da-Pe-Dia</title>
    <style>
        * { box-sizing: border-box; }
        
        html, body {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
            position: fixed;
            background-color: #ffffff;
            -webkit-text-size-adjust: 100%;
            touch-action: manipulation;
        }

        body {
            font-family: Arial, sans-serif;
            height: 100vh;
            width: 100vw;
            transition: transform 0.6s cubic-bezier(0.25, 1, 0.5, 1);
        }
        
        /* Slide Transitions */
        .slide-left { transform: translateX(-100vw); }
        .slide-right { transform: translateX(100vw); }
        .slide-up { transform: translateY(-100vh); }
        .slide-down { transform: translateY(100vh); }

        /* Shared Components */
        h1 {
            color: #ff6600; 
            font-weight: 600;
            letter-spacing: -2px;
            margin: 0;
        }
        .subtitle {
            font-size: 1rem;
            font-weight: bold;
            color: #000000;
            letter-spacing: 2px;
        }
        .fake-input {
            width: 100%;
            padding: 15px 20px;
            font-size: 16px;
            border: 2px solid #ff6600;
            border-radius: 24px;
            background-color: #ffffff;
            box-shadow: 0 1px 6px rgba(255, 102, 0, 0.2);
            color: #a9a9a9;
            text-align: left;
            cursor: pointer;
            min-height: 52px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            user-select: none;
        }
        .fake-input.has-text { color: #000000; }
        
        button {
            background-color: #ffffff;
            border: 2px solid #ff6600;
            border-radius: 4px;
            color: #000000;
            font-family: arial, sans-serif;
            font-size: 14px;
            padding: 0 16px;
            height: 36px;
            text-align: center;
            cursor: pointer;
            user-select: none;
        }
        button:hover {
            box-shadow: 0 1px 4px rgba(255, 102, 0, 0.3);
            background-color: #fff8f5;
        }

        /* --- VIEW 1: HOME PAGE (Lowered everything by 150px) --- */
        #home-view {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding-top: calc(12vh + 150px); /* Lowered layout by roughly 150px */
            height: 100%;
            width: 100%;
        }
        #home-view h1 { font-size: 4.5rem; margin-bottom: 5px; }
        #home-view .subtitle { margin-bottom: 25px; }
        .search-container { width: 100%; max-width: 600px; padding: 20px; text-align: center; }
        .buttons { margin-top: 20px; display: flex; justify-content: center; gap: 8px; }

        /* --- VIEW 2: SEARCH RESULTS PAGE --- */
        #results-view {
            display: none;
            flex-direction: column;
            height: 100%;
            width: 100%;
            padding: 15px;
        }
        .results-header {
            height: 8%;
            display: flex;
            align-items: center;
            gap: 15px;
            border-bottom: 1px solid #eee;
            padding-bottom: 10px;
        }
        .results-header h1 { font-size: 1.8rem; letter-spacing: -1px; }
        .results-header .fake-input { min-height: 40px; padding: 8px 15px; font-size: 14px; max-width: 400px; }
        .results-body {
            flex: 1;
            padding: 20px 0;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .result-card {
            border-left: 4px solid #ff6600;
            padding: 15px;
            background: #fafafa;
        }
        .result-snippet { color: #333; font-size: 18px; font-weight: bold; }

        /* --- VIEW 3: ARCADE GAME VIEW --- */
        #pong-view {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            width: 100%;
            background: #ffffff;
            padding: 10px;
        }
        #pong-canvas {
            border: 3px solid #ff6600;
            background: #ffffff;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            max-width: 95%;
            max-height: 65vh;
            height: auto;
        }
        .pong-controls { margin-top: 10px; display: flex; flex-direction: column; gap: 8px; align-items: center; }
        .arcade-toggle-btn { background-color: #000000; color: #ffffff; border: 2px solid #000000; font-weight: bold; }
        .arcade-toggle-btn:hover { background-color: #222; color: #fff; }

        /* --- KEYBOARD OVERLAY --- */
        #keyboard-overlay {
            display: none;
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100vw;
            height: 40vh;
            background: rgba(255, 255, 255, 0.98);
            border-top: 3px solid #ff6600;
            z-index: 1000;
            overflow: hidden;
            box-shadow: 0 -5px 15px rgba(0,0,0,0.1);
        }
        .key {
            position: absolute;
            width: 50px;
            height: 50px;
            background: #ffffff;
            color: #000000;
            border: 2px solid #ff6600;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 18px;
            cursor: pointer;
            box-shadow: 0 3px 5px rgba(0,0,0,0.1);
            user-select: none;
            touch-action: none;
        }
        .key.special-key { width: 75px; font-size: 13px; background-color: #fffaf7; }
        .key:active { background: #fff0e6; }
        #close-keyboard {
            position: absolute;
            top: 10px;
            right: 10px;
            border: 2px solid #ff6600;
            background: white;
            z-index: 1002;
            height: 30px;
            line-height: 24px;
            padding: 0 10px;
            font-size: 12px;
        }

        /* MOBILE SCREEN OVERRIDES */
        @media only screen and (max-width: 600px) {
            #home-view { justify-content: flex-start; padding-top: 5vh; }
            #home-view h1 { font-size: 2.8rem; }
            .search-container { height: 50vh; display: flex; flex-direction: column; justify-content: center; }
            .key { width: 38px !important; height: 38px !important; font-size: 14px !important; }
            .key.special-key { width: 58px !important; font-size: 11px !important; }
            #pong-canvas { width: 100%; height: 260px; }
        }
    </style>
</head>
<body>

    <div id="home-view">
        <div class="search-container">
            <h1>Mee-Da-Pe-Dia</h1>
            <div class="subtitle">ALL HAIL THE GREAT MEE</div>
            <div class="search-box-wrapper">
                <div class="fake-input trigger-keyboard">Search the abyss...</div>
            </div>
            <div class="buttons">
                <button id="search-btn-1">Mee-Da Search</button>
                <button id="annoyed-btn">I'm Feeling Annoyed</button>
            </div>
        </div>
    </div>

    <div id="results-view">
        <div class="results-header">
            <button id="back-btn">← Back</button>
            <h1 style="display:none;">Mee-Da-Pe-Dia</h1>
            <div class="fake-input trigger-keyboard" style="flex:1;">Search the abyss...</div>
        </div>
        <div class="results-body" id="results-body-content"></div>
    </div>

    <div id="pong-view">
        <h1 id="arcade-title" style="font-size: 1.8rem; margin-bottom: 5px;">MEE-PONG</h1>
        <canvas id="pong-canvas" width="700" height="400"></canvas>
        <div class="pong-controls">
            <div class="subtitle" id="pong-score">Player: 0 | Mee: 0</div>
            <div style="display: flex; gap: 10px;">
                <button id="dice-btn" style="display: none; background-color: #ff6600; color: white; font-weight: bold;">Roll Die (1)</button>
                <button id="quit-pong-btn">Exit Arcade</button>
                <button id="game-switch-btn" class="arcade-toggle-btn">Switch to Snakes & Ladders</button>
            </div>
        </div>
    </div>

    <div id="keyboard-overlay">
        <button id="close-keyboard">Close</button>
    </div>

    <script>
        const overlay = document.getElementById('keyboard-overlay');
        const body = document.body;
        const fakeInputs = document.querySelectorAll('.trigger-keyboard');

        const keysData = [...'ABCDEFGHIJKLMNOPQRSTUVWXYZ ', 'DEL', 'SEARCH'];
        let keys = [];
        let lastTransition = '';
        let currentTypedText = '';
        let audioCtx = null;
        let lastTime = performance.now();

        // Game state configurations
        let currentGameMode = 'pong'; // 'pong' or 'snakes'

        function initAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        function playSound(type) {
            initAudio();
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            const now = audioCtx.currentTime;

            if (type === 'boing') {
                osc.type = 'sine'; osc.frequency.setValueAtTime(160, now);
                osc.frequency.quadraticRampToValueAtTime(380, now + 0.12);
                osc.frequency.quadraticRampToValueAtTime(180, now + 0.25);
                gain.gain.setValueAtTime(0.12, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.25);
                osc.start(now); osc.stop(now + 0.25);
            } else if (type === 'slide') {
                osc.type = 'triangle'; osc.frequency.setValueAtTime(750, now);
                osc.frequency.exponentialRampToValueAtTime(220, now + 0.35);
                gain.gain.setValueAtTime(0.1, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.35);
                osc.start(now); osc.stop(now + 0.35);
            } else if (type === 'pop') {
                osc.type = 'sine'; osc.frequency.setValueAtTime(550, now);
                osc.frequency.exponentialRampToValueAtTime(120, now + 0.07);
                gain.gain.setValueAtTime(0.2, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.07);
                osc.start(now); osc.stop(now + 0.07);
            }
        }

        fakeInputs.forEach(input => {
            input.addEventListener('click', () => {
                initAudio(); overlay.style.display = 'block'; playSound('slide'); initKeyboard();
            });
        });

        document.getElementById('close-keyboard').addEventListener('click', () => {
            overlay.style.display = 'none'; playSound('slide');
        });

        document.getElementById('search-btn-1').addEventListener('click', () => handleSearchNav('search'));
        document.getElementById('annoyed-btn').addEventListener('click', () => handleSearchNav('pong'));
        document.getElementById('back-btn').addEventListener('click', () => navigateTo('home'));
        document.getElementById('quit-pong-btn').addEventListener('click', () => navigateTo('home'));
        
        // Game switcher engine toggle
        const gameSwitchBtn = document.getElementById('game-switch-btn');
        gameSwitchBtn.addEventListener('click', () => {
            playSound('slide');
            if (currentGameMode === 'pong') {
                currentGameMode = 'snakes';
                gameSwitchBtn.innerText = "Switch to Pong";
                document.getElementById('arcade-title').innerText = "SNAKES & LADDERS (MEE EDITION)";
                document.getElementById('dice-btn').style.display = 'inline-block';
                resetSnakesGame();
            } else {
                currentGameMode = 'pong';
                gameSwitchBtn.innerText = "Switch to Snakes & Ladders";
                document.getElementById('arcade-title').innerText = "MEE-PONG";
                document.getElementById('dice-btn').style.display = 'none';
                p1Score = 0; p2Score = 0; resetBall(); updatePongUI();
            }
        });

        function syncInputDisplay() {
            fakeInputs.forEach(input => {
                if (currentTypedText === '') {
                    input.innerText = "Search the abyss..."; input.classList.remove('has-text');
                } else {
                    input.innerText = currentTypedText; input.classList.add('has-text');
                }
            });
        }

        function initKeyboard() {
            overlay.querySelectorAll('.key').forEach(k => k.remove());
            keys = [];
            
            const viewW = window.innerWidth;
            const viewH = window.innerHeight * 0.4;
            const isPhone = viewW <= 600;

            const cols = 6;
            keysData.forEach((char, idx) => {
                const keyEl = document.createElement('div');
                keyEl.className = 'key';
                let isSpecial = (char === 'DEL' || char === 'SEARCH');
                if (isSpecial) keyEl.classList.add('special-key');
                keyEl.innerText = char === ' ' ? '␣' : char;
                
                let kw = isSpecial ? (isPhone ? 58 : 75) : (isPhone ? 38 : 50); 
                let kh = isPhone ? 38 : 50;

                const row = Math.floor(idx / cols); 
                const col = idx % cols;

                const colZoneWidth = viewW / cols;
                const baseGridX = (col * colZoneWidth) + (colZoneWidth - kw) / 2;
                const baseGridY = (row * (kh + 12)) + 45;

                const x = baseGridX + (Math.random() * 16 - 8);
                const y = baseGridY + (Math.random() * 10 - 5);
                
                const angle = Math.random() * Math.PI * 2;
                const randomVelocitySpeed = 140 + (Math.random() * 80);

                keyEl.style.left = `${x}px`; keyEl.style.top = `${y}px`;

                const handleTap = (e) => {
                    e.preventDefault(); e.stopPropagation(); playSound('pop');
                    if (char === 'DEL') currentTypedText = currentTypedText.slice(0, -1);
                    else if (char === 'SEARCH') { overlay.style.display = 'none'; handleSearchNav('search'); }
                    else currentTypedText += char;
                    syncInputDisplay();
                };

                keyEl.addEventListener('touchstart', handleTap, { passive: false });
                keyEl.addEventListener('mousedown', handleTap);

                overlay.appendChild(keyEl);
                keys.push({
                    element: keyEl, x, y, width: kw, height: kh,
                    dx: Math.cos(angle) * randomVelocitySpeed, dy: Math.sin(angle) * randomVelocitySpeed,
                    phase: Math.random() * 100
                });
            });
        }

        function handleDynamicPhysics(dt) {
            const widthBound = window.innerWidth;
            const heightBound = window.innerHeight * 0.4;

            for (let i = 0; i < keys.length; i++) {
                for (let j = i + 1; j < keys.length; j++) {
                    let k1 = keys[i]; let k2 = keys[j];

                    if (k1.x < k2.x + k2.width && k1.x + k1.width > k2.x &&
                        k1.y < k2.y + k2.height && k1.y + k1.height > k2.y) {
                        
                        let overlapX = Math.min(k1.x + k1.width, k2.x + k2.width) - Math.max(k1.x, k2.x);
                        let overlapY = Math.min(k1.y + k1.height, k2.y + k2.height) - Math.max(k1.y, k2.y);

                        if (overlapX < overlapY) {
                            if (k1.x + k1.width / 2 < k2.x + k2.width / 2) {
                                k1.x -= overlapX / 2; k2.x += overlapX / 2;
                            } else {
                                k1.x += overlapX / 2; k2.x -= overlapX / 2;
                            }
                            let temp = k1.dx; k1.dx = k2.dx; k2.dx = temp;
                        } else {
                            if (k1.y + k1.height / 2 < k2.y + k2.height / 2) {
                                k1.y -= overlapY / 2; k2.y += overlapY / 2;
                            } else {
                                k1.y += overlapY / 2; k2.y -= overlapY / 2;
                            }
                            let temp = k1.dy; k1.dy = k2.dy; k2.dy = temp;
                        }
                        if(Math.random() < 0.05) playSound('boing');
                    }
                }
            }

            keys.forEach(key => {
                key.phase += dt * 4;
                let instSpeed = 1 + Math.sin(key.phase) * 0.35 + (Math.random() - 0.5) * 0.2;

                key.x += key.dx * instSpeed * dt;
                key.y += key.dy * instSpeed * dt;

                let hit = false;
                if (key.x <= 0) { key.x = 0; key.dx *= -1; hit = true; }
                else if (key.x >= widthBound - key.width) { key.x = widthBound - key.width; key.dx *= -1; hit = true; }

                if (key.y <= 0) { key.y = 0; key.dy *= -1; hit = true; }
                else if (key.y >= heightBound - key.height) { key.y = heightBound - key.height; key.dy *= -1; hit = true; }

                key.element.style.left = `${key.x}px`;
                key.element.style.top = `${key.y}px`;

                if (hit && Math.random() < 0.1) playSound('boing');
            });
        }

        function loop(timestamp) {
            requestAnimationFrame(loop);
            let dt = (timestamp - lastTime) / 1000;
            if (dt > 0.1) dt = 0.1;
            lastTime = timestamp;

            if (overlay.style.display === 'block') {
                handleDynamicPhysics(dt);
            }
            if (document.getElementById('pong-view').style.display === 'flex') {
                if (currentGameMode === 'pong') {
                    runPongLogic();
                } else if (currentGameMode === 'snakes') {
                    renderSnakesBoard();
                }
            }
        }
        requestAnimationFrame(loop);

        const transitions = ['slide-left', 'slide-right', 'slide-up', 'slide-down'];
        const responses = ["IDK", "Ask yo mama.", "Error 404: I just don't care.", "Google it yourself.", "Why are you asking me?", "I'm on break. Try again never.", "That sounds like a personal problem."];

        function handleSearchNav(targetMode) {
            if (targetMode === 'search' && currentTypedText.trim() === "") {
                alert("Type something first, genius."); return;
            }
            
            let pool = transitions.filter(t => t !== lastTransition);
            let chosen = pool[Math.floor(Math.random() * pool.length)];
            lastTransition = chosen;

            playSound('slide');
            body.classList.add(chosen);

            setTimeout(() => {
                body.style.transition = 'none';
                body.classList.remove(chosen);
                
                if (targetMode === 'search') buildSearchPage();
                else if (targetMode === 'pong') startArcadeView();

                if (chosen === 'slide-left') body.classList.add('slide-right');
                else if (chosen === 'slide-right') body.classList.add('slide-left');
                else if (chosen === 'slide-up') body.classList.add('slide-down');
                else if (chosen === 'slide-down') body.classList.add('slide-up');

                body.offsetHeight; 
                body.style.transition = 'transform 0.6s cubic-bezier(0.25, 1, 0.5, 1)';
                body.classList.remove('slide-left', 'slide-right', 'slide-up', 'slide-down');
                
                window.scrollTo(0, 0);
            }, 600);
        }

        function navigateTo(viewName) {
            playSound('slide');
            document.getElementById('home-view').style.display = 'none';
            document.getElementById('results-view').style.display = 'none';
            document.getElementById('pong-view').style.display = 'none';

            if (viewName === 'home') {
                document.getElementById('home-view').style.display = 'flex';
                window.scrollTo(0, 0);
            }
        }

        function buildSearchPage() {
            document.getElementById('home-view').style.display = 'none';
            document.getElementById('pong-view').style.display = 'none';
            document.getElementById('results-view').style.display = 'flex';

            const container = document.getElementById('results-body-content');
            container.innerHTML = '';

            const count = Math.floor(Math.random() * 3) + 3; 
            for (let i = 0; i < count; i++) {
                let randomAnswer = responses[Math.floor(Math.random() * responses.length)];
                let card = document.createElement('div');
                card.className = 'result-card';
                card.innerHTML = `
                    <div class="result-snippet">${randomAnswer} ALL HAIL THE GREAT MEE</div>
                `;
                container.appendChild(card);
            }
        }

        /* --- ARCADE ROUTER --- */
        function startArcadeView() {
            document.getElementById('home-view').style.display = 'none';
            document.getElementById('results-view').style.display = 'none';
            document.getElementById('pong-view').style.display = 'flex';
            
            if (currentGameMode === 'pong') {
                p1Score = 0; p2Score = 0; resetBall(); updatePongUI();
            } else {
                resetSnakesGame();
            }
        }

        /* --- ARCADE: PONG ENGINE --- */
        const canvas = document.getElementById('pong-canvas');
        const ctx = canvas.getContext('2d');
        let p1Y = 150, p2Y = 110, ballX = 350, ballY = 200, ballDX = 4, ballDY = 3;
        let p1Score = 0, p2Score = 0;
        
        // BALANCING CONFIG: Player paddle is 80px, AI paddle is now TWICE as large (160px)!
        const paddleH_Player = 80;
        const paddleH_AI = 160; 
        const paddleW = 12, ballRadius = 8;

        const handlePaddleDrag = (e) => {
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            const scaleY = canvas.height / rect.height;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            const touchY = (clientY - rect.top) * scaleY;
            p1Y = Math.max(0, Math.min(touchY - paddleH_Player / 2, canvas.height - paddleH_Player));
        };

        canvas.addEventListener('touchmove', handlePaddleDrag, { passive: false });
        canvas.addEventListener('mousemove', (e) => {
            if(e.buttons === 1) handlePaddleDrag(e);
        });

        function resetBall() {
            ballX = canvas.width / 2; ballY = canvas.height / 2;
            ballDX = (Math.random() > 0.5 ? 4 : -4); ballDY = (Math.random() * 4) - 2;
        }

        function updatePongUI() {
            if (currentGameMode === 'pong') {
                document.getElementById('pong-score').innerText = `Player: ${p1Score} | Mee: ${p2Score} ALL HAIL MEE`;
            }
        }

        function runPongLogic() {
            ballX += ballDX; ballY += ballDY;

            if (ballY - ballRadius <= 0 || ballY + ballRadius >= canvas.height) {
                ballDY *= -1; playSound('pop');
            }

            // Tracking logic maps perfectly against the center of the giant 160px paddle
            let trackingSpeed = 3.6;
            if (p2Y + paddleH_AI / 2 < ballY) p2Y += trackingSpeed;
            else if (p2Y + paddleH_AI / 2 > ballY) p2Y -= trackingSpeed;
            p2Y = Math.max(0, Math.min(p2Y, canvas.height - paddleH_AI));

            if (ballX - ballRadius <= paddleW + 10) {
                if (ballY >= p1Y && ballY <= p1Y + paddleH_Player) {
                    ballDX *= -1.1; 
                    let impact = (ballY - (p1Y + paddleH_Player / 2)) / (paddleH_Player / 2);
                    ballDY = impact * 4; playSound('boing');
                } else {
                    p2Score++; resetBall(); updatePongUI(); playSound('slide');
                }
            }

            if (ballX + ballRadius >= canvas.width - paddleW - 10) {
                if (ballY >= p2Y && ballY <= p2Y + paddleH_AI) {
                    ballDX *= -1.1;
                    let impact = (ballY - (p2Y + paddleH_AI / 2)) / (paddleH_AI / 2);
                    ballDY = impact * 4; playSound('boing');
                } else {
                    p1Score++; resetBall(); updatePongUI(); playSound('slide');
                }
            }

            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#ff6600';

            // Draw player paddle
            ctx.fillRect(10, p1Y, paddleW, paddleH_Player);
            // Draw Mee's giant paddle
            ctx.fillRect(canvas.width - paddleW - 10, p2Y, paddleW, paddleH_AI);
            // Draw Ball
            ctx.beginPath(); ctx.arc(ballX, ballY, ballRadius, 0, Math.PI * 2); ctx.fill();
        }


        /* --- ARCADE: SNAKES & LADDERS ENGINE --- */
        let playerSquare = 1;
        let meeSquare = 1;
        let snakesGameStatus = "Your turn. Roll!";
        let trapdoorProgress = 0; // Animation tracker for trapdoor
        let isTrapdoorAnimating = false;

        // Custom Board Map
        const snakesAndLaddersMap = {
            // Ladders
            4: 14, 9: 31, 20: 38, 28: 84, 40: 59, 63: 81, 71: 91,
            // Snakes
            17: 7, 54: 34, 62: 18, 64: 60, 87: 24, 93: 73, 95: 75, 99: 12
        };

        function resetSnakesGame() {
            playerSquare = 1;
            meeSquare = 1;
            trapdoorProgress = 0;
            isTrapdoorAnimating = false;
            snakesGameStatus = "Your turn. Roll!";
            updateSnakesUI();
        }

        function updateSnakesUI() {
            if (currentGameMode === 'snakes') {
                document.getElementById('pong-score').innerText = snakesGameStatus;
            }
        }

        // Dice Roller Click Trigger
        document.getElementById('dice-btn').addEventListener('click', () => {
            if (currentGameMode !== 'snakes' || isTrapdoorAnimating) return;
            
            // 1. PLAYER ROLLS 1 DIE
            playSound('pop');
            const playerRoll = Math.floor(Math.random() * 6) + 1;
            playerSquare += playerRoll;
            
            snakesGameStatus = `You rolled a ${playerRoll}! `;

            if (playerSquare >= 100) {
                playerSquare = 100;
                snakesGameStatus += "You reached the end?! Wait...";
                updateSnakesUI();
                triggerTrapdoorSequence();
                return;
            }

            // Apply snakes or ladders
            if (snakesAndLaddersMap[playerSquare]) {
                const target = snakesAndLaddersMap[playerSquare];
                if (target > playerSquare) snakesGameStatus += `🚀 Ladder up to ${target}!`;
                else snakesGameStatus += `🐍 Down a snake to ${target}!`;
                playerSquare = target;
                playSound('boing');
            }

            updateSnakesUI();

            // 2. COMPUTER ROLLS 3 DICE IMMEDIATELY
            setTimeout(() => {
                if (currentGameMode !== 'snakes') return;
                const d1 = Math.floor(Math.random() * 6) + 1;
                const d2 = Math.floor(Math.random() * 6) + 1;
                const d3 = Math.floor(Math.random() * 6) + 1;
                const totalMeeRoll = d1 + d2 + d3;

                meeSquare += totalMeeRoll;
                playSound('boing');
                snakesGameStatus = `Mee rolled 3 dice: (${d1}, ${d2}, ${d3}) totaling ${totalMeeRoll}! `;

                if (meeSquare >= 100) {
                    meeSquare = 100;
                    snakesGameStatus += "MEE WINS! ALL HAIL MEE!";
                    updateSnakesUI();
                    return;
                }

                if (snakesAndLaddersMap[meeSquare]) {
                    const target = snakesAndLaddersMap[meeSquare];
                    if (target > meeSquare) snakesGameStatus += `🚀 Mee flew up a ladder to ${target}!`;
                    meeSquare = target;
                }

                snakesGameStatus += " Your turn!";
                updateSnakesUI();
            }, 1000);
        });

        function triggerTrapdoorSequence() {
            isTrapdoorAnimating = true;
            trapdoorProgress = 0;
            playSound('slide');
        }

        function renderSnakesBoard() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Draw a basic 10x10 grids layout packed cleanly into canvas box dimensions
            const boardSize = Math.min(canvas.width, canvas.height) - 20;
            const startX = (canvas.width - boardSize) / 2;
            const startY = 10;
            const cellSize = boardSize / 10;

            // Draw grid squares
            for (let r = 0; r < 10; r++) {
                for (let c = 0; c < 10; c++) {
                    // Alternate square arrangements snake-style format rows
                    let squareNum;
                    if (r % 2 === 0) {
                        squareNum = (9 - r) * 10 + (c + 1);
                    } else {
                        squareNum = (9 - r) * 10 + (10 - c);
                    }

                    const x = startX + (c * cellSize);
                    const y = startY + (r * cellSize);

                    // Colors
                    if (squareNum === 100) {
                        ctx.fillStyle = '#ff3300'; // Finish Line!
                    } else if (squareNum === 1) {
                        ctx.fillStyle = '#ccffcc'; // Start square
                    } else if (snakesAndLaddersMap[squareNum]) {
                        ctx.fillStyle = snakesAndLaddersMap[squareNum] > squareNum ? '#fff0e6' : '#f2f2f2';
                    } else {
                        ctx.fillStyle = (r + c) % 2 === 0 ? '#ffffff' : '#fafafa';
                    }

                    ctx.fillRect(x, y, cellSize, cellSize);
                    ctx.strokeStyle = '#ff6600';
                    ctx.lineWidth = 0.5;
                    ctx.strokeRect(x, y, cellSize, cellSize);

                    // Numbers text layout mapping
                    ctx.fillStyle = '#a9a9a9';
                    ctx.font = '10px Arial';
                    ctx.fillText(squareNum, x + 4, y + 12);
                }
            }

            // Draw Helper Labels for Snakes and Ladders lines
            Object.keys(snakesAndLaddersMap).forEach(key => {
                const from = parseInt(key);
                const to = snakesAndLaddersMap[from];
                const pFrom = getCellCoords(from, startX, startY, cellSize);
                const pTo = getCellCoords(to, startX, startY, cellSize);

                ctx.beginPath();
                ctx.moveTo(pFrom.x, pFrom.y);
                ctx.lineTo(pTo.x, pTo.y);
                ctx.strokeStyle = to > from ? 'rgba(0, 153, 76, 0.4)' : 'rgba(255, 0, 0, 0.4)';
                ctx.lineWidth = 4;
                ctx.stroke();
            });

            // Get character coordinates
            let pCoords = getCellCoords(playerSquare, startX, startY, cellSize);
            let mCoords = getCellCoords(meeSquare, startX, startY, cellSize);

            // SECRET TRAPDOOR ANIMATION LOOP SEQUENCE
            if (isTrapdoorAnimating && playerSquare === 100) {
                trapdoorProgress += 0.015;
                const finishSquareCoords = getCellCoords(100, startX, startY, cellSize);
                
                // Draw trapdoor splitting open inside the square box context bounds
                ctx.fillStyle = '#ffffff';
                ctx.fillRect(finishSquareCoords.x - cellSize/2 + 2, finishSquareCoords.y - cellSize/2 + 2, cellSize - 4, cellSize * trapdoorProgress);
                
                // Drop player character position downwards through the floor coordinates
                pCoords.y += (cellSize * trapdoorProgress * 2.5);

                if (trapdoorProgress >= 1) {
                    // Reset character back to square one!
                    isTrapdoorAnimating = false;
                    playerSquare = 1;
                    trapdoorProgress = 0;
                    snakesGameStatus = "TRAPDOOR ACTIVATED! You fell all the way back to square 1! 😂";
                    playSound('slide');
                    updateSnakesUI();
                }
            }

            // Render Player Piece (Blue Circle)
            ctx.beginPath();
            ctx.arc(pCoords.x - 6, pCoords.y, 8, 0, Math.PI * 2);
            ctx.fillStyle = '#0066cc';
            ctx.fill();

            // Render Mee Piece (Orange Circle)
            ctx.beginPath();
            ctx.arc(mCoords.x + 6, mCoords.y, 8, 0, Math.PI * 2);
            ctx.fillStyle = '#ff6600';
            ctx.fill();
            ctx.strokeStyle = '#000000';
            ctx.lineWidth = 1;
            ctx.stroke();
        }

        // Math converter map for square IDs into canvas pixel coords
        function getCellCoords(square, startX, startY, cellSize) {
            const totalRows = 10;
            const zeroIndexed = square - 1;
            const r = Math.floor(zeroIndexed / 10);
            let c = zeroIndexed % 10;
            
            // Adjust coordinates based on snake row alignment flips
            if (r % 2 !== 0) {
                c = 9 - c;
            }
            
            const actualRow = 9 - r;
            return {
                x: startX + (c * cellSize) + cellSize / 2,
                y: startY + (actualRow * cellSize) + cellSize / 2
            };
        }

        window.addEventListener('touchstart', initAudio, { once: true });
    </script>
</body>
</html>
